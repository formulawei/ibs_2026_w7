<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>IBS W7｜Corporate Diversification & Portfolio Strategy</title>
<style>
/* ════════════════════════════════════════════
   NTU W7 palette — Corporate Diversification
   ════════════════════════════════════════════ */
:root{
  --ntu:#002B5C; --ntu2:#01356F; --gold:#C9A227;
  --paper:#F4F7FC; --ink:#0B1220; --muted:#475569;
  --muted2:#64748B; --line:#D7DEE9; --card:#FFFFFF;
  --shadow:0 10px 30px rgba(2,6,23,.10);
  --radius:16px; --radius2:20px;
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --sans:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  --s0:#1A6B4A; --t1:#7B2F00; --t2:#1A4A8B;
  --t3:#5B21B6; --c1:#0E7490; --s1:#065F46;
}
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{font-family:var(--sans);font-size:16px;color:var(--ink);
  background:radial-gradient(1200px 600px at 8% 0%,rgba(0,43,92,.07),transparent 55%),
             radial-gradient(900px 500px at 96% 4%,rgba(201,162,39,.10),transparent 55%),
             var(--paper);}

/* ── Topbar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;
  padding:13px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;
  background:rgba(244,247,252,.94);backdrop-filter:blur(10px);z-index:20;}
.brand{display:flex;gap:12px;align-items:center;min-width:0;}
.logo{width:50px;height:50px;display:grid;place-items:center;border-radius:14px;
  background:linear-gradient(135deg,var(--ntu),var(--ntu2));color:#fff;
  font-weight:900;letter-spacing:.08em;box-shadow:0 8px 22px rgba(0,43,92,.28);font-size:13px;}
.brandText{min-width:0;}
.course{font-size:11px;color:var(--muted);letter-spacing:.03em;}
.topic{font-size:17px;font-weight:900;color:var(--ntu);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
.btn{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 14px;
  font-weight:700;cursor:pointer;transition:.12s ease;font-size:13px;color:var(--ink);}
.btn:hover{border-color:rgba(0,43,92,.35);box-shadow:0 6px 16px rgba(0,0,0,.08);}
.btn:active{transform:translateY(1px);}
.btn.gold{border-color:rgba(201,162,39,.45);background:rgba(201,162,39,.12);color:#5A4600;}

/* ── Layout ── */
.layout{display:grid;grid-template-columns:288px 1fr;gap:18px;padding:18px;
  max-width:1480px;margin:0 auto;}

/* ── Sidebar ── */
.sidebar{position:sticky;top:86px;align-self:start;
  border:1px solid var(--line);border-radius:var(--radius2);
  background:rgba(255,255,255,.78);backdrop-filter:blur(8px);
  box-shadow:var(--shadow);padding:14px;
  max-height:calc(100vh - 104px);overflow-y:auto;}
.navTitle{font-size:10px;color:var(--muted);letter-spacing:.14em;
  text-transform:uppercase;margin-bottom:10px;padding:0 4px;}
.navItem{width:100%;text-align:left;padding:9px 11px;border-radius:11px;
  border:1px solid transparent;background:transparent;cursor:pointer;
  font-weight:700;font-size:13px;color:var(--ntu2);display:block;
  transition:.1s ease;margin-bottom:2px;line-height:1.35;}
.navItem:hover{background:rgba(0,43,92,.06);}
.navItem.active{background:rgba(0,43,92,.10);border-color:rgba(0,43,92,.18);}
.navItem.seg-s0.active{background:rgba(26,107,74,.10);border-color:rgba(26,107,74,.25);color:var(--s0);}
.navItem.seg-t1.active{background:rgba(123,47,0,.10);border-color:rgba(123,47,0,.25);color:var(--t1);}
.navItem.seg-t2.active{background:rgba(26,74,139,.10);border-color:rgba(26,74,139,.25);color:var(--t2);}
.navItem.seg-t3.active{background:rgba(91,33,182,.10);border-color:rgba(91,33,182,.25);color:var(--t3);}
.navItem.seg-c1.active{background:rgba(14,116,144,.10);border-color:rgba(14,116,144,.25);color:var(--c1);}
.navItem.seg-s1.active{background:rgba(6,95,70,.10);border-color:rgba(6,95,70,.25);color:var(--s1);}
.navFooter{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line);}
.hint{font-size:11px;color:var(--muted);line-height:1.5;}
.kbd{font-family:var(--mono);font-weight:900;padding:2px 6px;
  border:1px solid var(--line);border-radius:7px;background:#fff;
  color:var(--muted);font-size:10px;}

/* ── Content ── */
.content{border:1px solid var(--line);border-radius:var(--radius2);
  background:rgba(255,255,255,.88);backdrop-filter:blur(8px);
  box-shadow:var(--shadow);padding:24px;min-height:calc(100vh - 160px);}
.sectionHead{display:flex;align-items:flex-start;justify-content:space-between;
  gap:14px;margin-bottom:20px;}
.h1{font-size:27px;font-weight:900;color:var(--ntu);margin:0;line-height:1.18;}
.sub{margin:6px 0 0;color:var(--muted);line-height:1.5;font-size:15px;}
.tag{display:inline-flex;align-items:center;gap:8px;
  border:1px solid rgba(0,43,92,.25);background:rgba(0,43,92,.08);
  color:var(--ntu);padding:8px 14px;border-radius:999px;
  font-weight:800;white-space:nowrap;font-size:13px;}

/* time tracker */
.timeTracker{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.timePill{font-size:11px;font-weight:800;padding:5px 10px;border-radius:999px;
  border:1px solid var(--line);background:#fff;color:var(--muted);}
.timePill.s0{background:var(--s0);color:#fff;border-color:var(--s0);}
.timePill.t1{background:var(--t1);color:#fff;border-color:var(--t1);}
.timePill.t2{background:var(--t2);color:#fff;border-color:var(--t2);}
.timePill.t3{background:var(--t3);color:#fff;border-color:var(--t3);}
.timePill.c1{background:var(--c1);color:#fff;border-color:var(--c1);}
.timePill.s1{background:var(--s1);color:#fff;border-color:var(--s1);}
.timePill.cur{opacity:1!important;}

/* ── Cards / Grid ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.card{border:1px solid var(--line);border-radius:var(--radius);
  background:var(--card);padding:16px;box-shadow:0 6px 18px rgba(0,0,0,.06);}
.cardTitle{font-weight:900;color:var(--ntu);margin:0 0 10px;font-size:15px;}
.p{margin:0;color:var(--ink);line-height:1.65;font-size:15px;}
.ul{margin:8px 0 0 20px;color:var(--ink);line-height:1.65;font-size:15px;}
.ul li{margin-bottom:5px;}
.sm{font-size:13px;color:var(--muted);}
hr.sep{border:0;border-top:1px solid var(--line);margin:14px 0;}

/* ── Callout ── */
.callout{border-left:5px solid var(--ntu);padding:12px 14px;
  background:rgba(0,43,92,.05);border-radius:12px;margin:10px 0;line-height:1.6;}
.callout.gold{border-color:var(--gold);background:rgba(201,162,39,.08);}
.callout.green{border-color:#15803d;background:rgba(21,128,61,.06);}
.callout.purple{border-color:#7C3AED;background:rgba(124,58,237,.06);}
.callout.red{border-color:#DC2626;background:rgba(220,38,38,.05);}
.callout.orange{border-color:var(--t3);background:rgba(91,33,182,.06);}
.callout.teal{border-color:#0E7490;background:rgba(14,116,144,.06);}
.callout strong{color:var(--ntu);}
.callout.gold strong{color:#7C5500;}
.callout.green strong{color:#14532D;}
.callout.purple strong{color:#5B21B6;}
.callout.red strong{color:#991B1B;}
.callout.orange strong{color:#4C1D95;}
.callout.teal strong{color:#164E63;}

/* ── Pill row ── */
.pillRow{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0;}
.pill{border:1px solid var(--line);background:#fff;border-radius:999px;
  padding:6px 11px;font-weight:700;font-size:13px;
  display:flex;align-items:center;gap:6px;color:var(--ink);}
.dot{width:9px;height:9px;border-radius:50%;background:var(--gold);flex-shrink:0;}
.dot.b{background:var(--ntu);}
.dot.g{background:#15803d;}
.dot.p{background:#7C3AED;}
.dot.r{background:#DC2626;}
.dot.o{background:var(--t3);}
.dot.t{background:#0E7490;}

/* ── Poll / Quiz ── */
.qBox{border:1.5px dashed rgba(0,43,92,.28);background:rgba(0,43,92,.03);
  border-radius:14px;padding:14px;}
.qTitle{font-weight:900;margin:0 0 10px;color:var(--ntu);font-size:15px;}
.options{display:grid;gap:8px;}
.opt{border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px 12px;
  cursor:pointer;font-weight:700;text-align:left;transition:.1s ease;
  font-size:14px;color:var(--ink);}
.opt:hover{border-color:rgba(0,43,92,.35);box-shadow:0 6px 16px rgba(0,0,0,.07);}
.opt.chosen{border-color:rgba(0,43,92,.50);background:rgba(0,43,92,.06);}
.opt.correct{border-color:#15803d;background:rgba(21,128,61,.09);color:#14532d;}
.opt.wrong{border-color:#DC2626;background:rgba(220,38,38,.07);color:#7f1d1d;}
.opt[disabled]{cursor:default;}
.barWrap{display:flex;align-items:center;gap:8px;margin-top:8px;}
.bar{height:11px;border-radius:999px;background:rgba(0,0,0,.06);
  overflow:hidden;flex:1;border:1px solid var(--line);}
.fill{height:100%;width:0%;background:linear-gradient(90deg,var(--gold),var(--ntu));
  transition:width .4s ease;}
.smallVote{color:var(--muted);font-size:12px;font-family:var(--mono);}

/* ── Sliders ── */
.sliderRow{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin:10px 0;}
input[type=range]{width:min(340px,100%);accent-color:var(--ntu);cursor:pointer;}
.valBadge{font-family:var(--mono);font-weight:800;padding:5px 10px;
  border:1px solid var(--line);border-radius:10px;background:#fff;
  font-size:14px;color:var(--ntu);}

/* ── Game containers ── */
.gameBox{border:2px solid var(--line);border-radius:var(--radius);
  padding:20px;background:var(--card);box-shadow:var(--shadow);margin:14px 0;}
.gameTitle{font-weight:900;font-size:15px;color:var(--ntu);margin-bottom:6px;
  display:flex;align-items:center;gap:8px;}
.gameTag{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  padding:3px 10px;border-radius:999px;background:rgba(0,43,92,.1);color:var(--ntu);}
.gameInstr{font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.55;}
.gameReveal{border-left:4px solid var(--gold);background:rgba(201,162,39,.06);
  border-radius:0 10px 10px 0;padding:12px 14px;font-size:13px;line-height:1.6;
  display:none;margin-top:12px;}
.gameReveal.visible{display:block;animation:fadeSlide .35s ease;}
@keyframes fadeSlide{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.gameBtnRow{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.gameBtn{border:1.5px solid var(--line);background:#fff;border-radius:999px;
  padding:8px 16px;font-weight:700;cursor:pointer;transition:.12s;font-size:13px;}
.gameBtn:hover{border-color:var(--ntu);color:var(--ntu);}
.gameBtn.primary{background:var(--ntu);color:#fff;border-color:var(--ntu);}
.gameBtn.primary:hover{background:#01356F;}
.gameBtn.success{background:#14532D;color:#fff;border-color:#14532D;}

/* ── Classify drag-drop ── */
.classifyRow{display:flex;gap:14px;flex-wrap:wrap;}
.classifyCol{flex:1;min-width:180px;border:2px dashed var(--line);
  border-radius:14px;padding:12px;min-height:120px;transition:.15s;}
.classifyCol.over{border-color:var(--ntu);background:rgba(0,43,92,.04);}
.classifyColTitle{font-weight:900;font-size:13px;text-align:center;
  margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--line);}
.classifyChip{border:1.5px solid var(--line);background:#fff;border-radius:10px;
  padding:8px 10px;cursor:grab;font-weight:700;font-size:12px;
  color:var(--ink);user-select:none;transition:.1s ease;
  margin-bottom:6px;line-height:1.4;}
.classifyChip:hover{border-color:rgba(0,43,92,.40);}
.classifyChip.correct-chip{border-color:#15803d;background:rgba(21,128,61,.09);}
.classifyChip.wrong-chip{border-color:#DC2626;background:rgba(220,38,38,.06);}
.classifyBank{display:flex;gap:8px;flex-wrap:wrap;min-height:50px;
  padding:10px;border:2px dashed rgba(0,43,92,.18);border-radius:12px;
  background:rgba(0,43,92,.02);margin-bottom:10px;}

/* ── Strategy Continuum Slider ── */
.continuumWrap{position:relative;margin:18px 0;}
.continuumBar{height:20px;border-radius:10px;width:100%;
  background:linear-gradient(90deg,#7C3AED,#1A4A8B,#C9A227,#15803d);
  position:relative;}
.continuumLabels{display:flex;justify-content:space-between;font-size:11px;
  font-weight:800;color:var(--muted);margin-top:4px;letter-spacing:.03em;}
.continuumMarker{position:absolute;top:-8px;width:36px;height:36px;border-radius:50%;
  background:var(--gold);border:3px solid var(--ntu);
  transform:translateX(-50%);box-shadow:0 4px 12px rgba(0,43,92,.30);
  cursor:ew-resize;z-index:5;display:grid;place-items:center;
  font-size:10px;font-weight:900;color:var(--ntu);transition:.2s ease;}
.continuumTick{position:absolute;top:0;width:2px;height:20px;background:rgba(255,255,255,.4);}
.continuumExamples{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:8px;}
.contEx{font-size:11px;font-weight:700;text-align:center;padding:4px;
  border-radius:8px;border:1px solid var(--line);background:#fff;
  color:var(--muted);transition:.15s;}
.contEx.highlighted{border-color:var(--gold);background:rgba(201,162,39,.10);color:#5A3A00;}

/* ── M-P Shape Picker ── */
.mpShapes{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0;}
.mpShape{border:2px solid var(--line);border-radius:14px;padding:14px;
  cursor:pointer;text-align:center;transition:.15s;background:#fff;}
.mpShape:hover{border-color:rgba(0,43,92,.35);}
.mpShape.chosen{border-color:var(--ntu);background:rgba(0,43,92,.05);}
.mpShape svg{display:block;margin:0 auto 8px;}
.mpShapeLabel{font-weight:800;font-size:12px;color:var(--ink);}

/* ── Risk Matrix 2x2 ── */
.riskMatrix{display:grid;grid-template-columns:1fr 1fr;gap:2px;
  border:2px solid var(--line);border-radius:12px;overflow:hidden;
  max-width:480px;margin:14px auto;}
.riskCell{padding:14px;min-height:110px;display:flex;flex-direction:column;
  justify-content:flex-start;font-size:12px;font-weight:700;line-height:1.45;
  cursor:pointer;transition:.15s;position:relative;}
.riskCell:hover{opacity:.85;}
.riskCell.active{outline:3px solid var(--ntu);outline-offset:-3px;}
.riskCellIcon{font-size:22px;margin-bottom:6px;}
.riskAxisX{display:flex;justify-content:space-between;font-size:11px;font-weight:700;
  color:var(--muted);padding:4px 0;max-width:480px;margin:0 auto;}
.riskAxisY{writing-mode:vertical-rl;transform:rotate(180deg);font-size:11px;
  font-weight:700;color:var(--muted);display:flex;align-items:center;justify-content:center;
  padding:6px 2px;letter-spacing:0.05em;}
.riskWrap{display:flex;gap:6px;align-items:stretch;max-width:540px;margin:0 auto;}
.riskTsukuda{position:absolute;bottom:6px;right:6px;width:22px;height:22px;border-radius:50%;
  background:var(--gold);border:3px solid var(--ntu);font-size:9px;font-weight:900;
  display:grid;place-items:center;color:var(--ntu);}

/* ── Memo Scaffold ── */
.memoScaffold{display:flex;flex-direction:column;gap:14px;margin:10px 0;}
.memoLayer{border-left:4px solid var(--line);padding:12px 14px;border-radius:0 10px 10px 0;
  background:rgba(244,247,252,.5);transition:.15s;}
.memoLayer:focus-within{background:#fff;}
.memoLayerLabel{font-weight:900;font-size:13px;margin-bottom:4px;}
.memoPrompt{font-size:12px;color:var(--muted);margin-bottom:8px;line-height:1.5;}
.memoField{width:100%;border:1.5px dashed var(--line);border-radius:8px;padding:10px 12px;
  font-size:13px;font-family:var(--sans);resize:vertical;min-height:80px;
  background:transparent;color:var(--ink);transition:.15s;}
.memoField:focus{outline:none;border-color:var(--t3);border-style:solid;background:#fff;}
.memoField.has-content{border-style:solid;border-color:var(--gold);}
.memoWordCount{font-size:11px;color:var(--muted);text-align:right;margin-top:3px;}

/* ── Scenario Flipper ── */
.sceneFlipper{border:1.5px solid var(--line);border-radius:16px;overflow:hidden;margin:14px 0;}
.sceneNav{display:flex;border-bottom:1px solid var(--line);}
.sceneTab{flex:1;padding:10px 6px;font-weight:800;font-size:12px;cursor:pointer;
  text-align:center;color:var(--muted);transition:.1s ease;border-right:1px solid var(--line);}
.sceneTab:last-child{border-right:none;}
.sceneTab.active{background:var(--ntu);color:#fff;}
.sceneTab:hover:not(.active){background:rgba(0,43,92,.06);}
.sceneBody{padding:18px;}

/* ── Worksheet styles ── */
.wsCard{border:1px solid var(--line);border-radius:14px;padding:16px;
  margin-bottom:14px;background:#fff;}
.wsLabel{font-weight:900;color:var(--ntu);font-size:14px;margin-bottom:10px;}
.wsTextarea{width:100%;min-height:120px;border:1.5px solid var(--line);
  border-radius:12px;padding:12px;font-family:var(--sans);font-size:14px;
  line-height:1.6;resize:vertical;outline:none;color:var(--ink);}
.wsTextarea:focus{border-color:rgba(0,43,92,.50);}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;right:24px;background:var(--ntu);color:#fff;
  padding:10px 18px;border-radius:999px;font-weight:700;font-size:13px;
  opacity:0;transform:translateY(8px);transition:.2s ease;pointer-events:none;z-index:99;}
#toast.show{opacity:1;transform:translateY(0);}

/* ── Presenter mode ── */
.presenter .sidebar{display:none;}
.presenter .layout{grid-template-columns:1fr;}
.presenter .h1{font-size:32px;}
.presenter .p,.presenter .ul{font-size:17px;}
.presenter .card{padding:20px;}

/* Responsive */
@media(max-width:880px){
  .layout{grid-template-columns:1fr;}
  .sidebar{position:static;max-height:none;}
  .grid2{grid-template-columns:1fr;}
  .grid3{grid-template-columns:1fr 1fr;}
  .mpShapes{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="brand">
    <div class="logo">NTU<br>IBS</div>
    <div class="brandText">
      <div class="course">IBS 2026 · International Business Strategy</div>
      <div class="topic">W7 · Corporate Diversification &amp; Portfolio Strategy</div>
    </div>
  </div>
  <div class="controls">
    <button class="btn" id="btnLang">EN / 中</button>
    <button class="btn gold" id="btnStudent">📝 Worksheet</button>
    <button class="btn" id="btnPresenter">投影模式</button>
    <button class="btn" id="btnReset">↺ Reset</button>
    <button class="btn" id="btnHelp">?</button>
  </div>
</div>

<div class="layout">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="navTitle">W7 Segments</div>
    <button class="navItem seg-s0" data-view="s0">🌾 S0 · 開場 · 8 min</button>
    <button class="navItem seg-t1" data-view="t1">📦 T1 · Wiersema: 多角化類型 · 18 min <span style="font-size:9px;color:var(--gold);">🎮</span></button>
    <button class="navItem seg-t2" data-view="t2">🗺️ T2 · Anand &amp; Collis: 策略光譜 · 17 min <span style="font-size:9px;color:var(--gold);">🎮</span></button>
    <button class="navItem seg-t3" data-view="t3">🌐 T3 · Pedersen + Belderbos: M-P關係 · 14 min <span style="font-size:9px;color:var(--gold);">🎮</span></button>
    <button class="navItem seg-c1" data-view="c1">📺 C1 · 劇情分析 S2 Ep1-3 · 15 min <span style="font-size:9px;color:var(--gold);">🎮</span></button>
    <button class="navItem seg-s1" data-view="s1">📝 S1 · 策略備忘錄 · 10 min <span style="font-size:9px;color:var(--gold);">🎮</span></button>
    <hr class="sep"/>
    <button class="navItem" data-view="student">📋 Student Worksheet</button>
    <div class="navFooter">
      <div class="hint">⬅ ➡ 切換段落<br/><span class="kbd">L</span> 語言 <span class="kbd">P</span> 投影 <span class="kbd">R</span> 重置</div>
    </div>
  </nav>

  <!-- Content -->
  <main class="content" id="content"></main>
</div>

<script>
const STORE = "ibs_w7_2026_v1";
const VIEW_ORDER = ["s0","t1","t2","t3","c1","s1","student"];

const DEF = {

let ST = load();

const content = document.getElementById("content");
const toast   = document.getElementById("toast");

function load(){ try{const s=localStorage.getItem(STORE);return s?{...DEF,...JSON.parse(s)}:{...DEF};}catch(e){return{...DEF};} }
function save(){ try{localStorage.setItem(STORE,JSON.stringify(ST));}catch(e){} }
function showToast(m){toast.textContent=m;toast.classList.add("show");clearTimeout(toast._t);toast._t=setTimeout(()=>toast.classList.remove("show"),2200);}

// ═══ POLL helpers ═══
function getPoll(k){return ST.polls[k]||{a:0,b:0,c:0,d:0,e:0,choice:null};}
function vote(k,ch){const p=getPoll(k);if(p.choice)p[p.choice]=Math.max(0,(p[p.choice]||0)-1);p.choice=ch;p[ch]=(p[ch]||0)+1;ST.polls[k]=p;save();}
function tot(p){return(p.a||0)+(p.b||0)+(p.c||0)+(p.d||0)+(p.e||0);}
function pct(p,k){const t=tot(p);return t?Math.round((p[k]||0)/t*100):0;}

function pollCard({key,title,title_en,opts,followup,followup_en}){
  const p=getPoll(key); const t=tot(p); const zh=ST.lang==="zh";
  const ttl=zh?title:title_en;
  const fup=zh?followup:followup_en;
  return `<div class="qBox">
    <p class="qTitle">📊 ${ttl}</p>
    <div class="options">
      ${opts.map(([k,lz,le])=>`<button class="opt${p.choice===k?' chosen':''}" data-poll="${key}" data-opt="${k}">${k.toUpperCase()}. ${zh?lz:le}</button>`).join("")}
    </div>
    ${t>0?`<div style="margin-top:10px;display:grid;gap:4px;">
      ${opts.map(([k,lz,le])=>`<div style="display:flex;align-items:center;gap:6px;">
        <span style="width:30px;font-weight:900;font-family:var(--mono);font-size:12px;">${pct(p,k)}%</span>
        <div class="bar"><div class="fill" style="width:${pct(p,k)}%"></div></div>
        <span style="font-size:12px;color:var(--muted)">${k.toUpperCase()}. ${zh?lz:le}</span>

    </div>`:`<div class="barWrap"><div class="bar"><div class="fill" style="width:0%"></div></div><span class="smallVote">${t} 票</span></div>`}

    <ul class="ul" style="font-size:13px;margin-top:0;color:var(--muted);">${fup.map(q=>`<li>${q}</li>`).join("")}</ul>`:``}
  </div>`;
}

function quizCard({key,q,q_en,opts,ans,exp,exp_en}){
  const zh=ST.lang==="zh"; const done=ST.quizDone[key];

    <p class="qTitle">🧠 ${zh?q:q_en}</p>

        ${String.fromCharCode(65+i)}. ${zh?lz:le}
      </button>`).join("")}
    </div>
    ${done?`<div class="callout ${done-1===ans?'green':'red'}" style="margin-top:10px;">
      <p class="p" style="font-size:13px;">${done-1===ans?"✅":"❌"} ${zh?exp:exp_en}</p>
    </div>`:`<div class="barWrap"><div class="bar"><div class="fill" style="width:0%"></div></div><span class="smallVote">${zh?"選一個選項":"Pick an option"}</span></div>`}
  </div>`;
}

function timeTags(cur){
  const zh=ST.lang==="zh";

    ["s0",zh?"🌾 S0 開場":"🌾 S0 Intro","8min"],
    ["t1",zh?"📦 T1 Wiersema":"📦 T1 Wiersema","18min"],

    ["t3",zh?"🌐 T3 Pedersen":"🌐 T3 Pedersen","14min"],
    ["c1",zh?"📺 C1 劇情":"📺 C1 Drama","15min"],
    ["s1",zh?"📝 S1 Memo":"📝 S1 Memo","10min"],
  ];
  return `<div class="timeTracker">${segs.map(([k,l,t])=>`<span class="timePill ${k} ${k===cur?'cur':''}" style="${k===cur?'':'opacity:.5'}">${l} ${t}</span>`).join("")}</div>`;

                "GearGhost 的定位直接影響 Wiersema & Beck 框架的應用層次：若視為「客戶」，只需評估技術遷移的可行性；若視為「合作夥伴」，還需評估共享資源的組合是否符合相關多角化；若視為「收購對象」，則須從 Anand & Collis 的視角評估佃製作所在策略光譜上的位置是否允許整合一家新事業。Belderbos et al. 會特別建議：在確定定位之前，先以「創造選擇權」的心態進入，保留升級定位的彈性——這正是為什麼「先合作供應閥門」比「直接收購」更能保存策略靈活性。"

      prompt_en:`On Anand & Collis's strategy continuum:

      label_en:"Layer 3: Risk Assessment — Does Diversification Reduce or Increase Overall Strategic Risk?",
      prompt_zh:`使用 Pedersen et al. + Belderbos et al. 框架：
① Gear Ghost 正面臨 15 億元的專利訴訟，這讓農機傳動領域的「市場不確定性」非常高。用 Belderbos et al. 的成長選擇權邏輯，在這種高不確定性情境下，「合作供應閥門（保留彈性）」vs.「直接收購（全力押注）」，哪種方式創造的成長選擇權價值更高？

③ Your judgment: Does President Tsukuda's 'trial small-batch supply' decision increase or decrease overall strategic risk? Why?`,

      label_zh:"第四層：整合建議",
      label_en:"Layer 4: Integrated Recommendation",
      prompt_zh:`綜合以上三層分析，給佃航平一個具體建議：
① 你支持「合作供應閥門」、「以少數股份投資 Gear Ghost」，還是「直接收購」？（必須明確站位，不接受「視情況而定」）

（字數目標：150-250字）`,
      prompt_en:`Synthesizing the three frameworks above, give President Tsukuda a specific strategic recommendation:

(Target: 150-250 words)`,

  <div class="callout" style="margin-bottom:14px;">

    <em>"${zh?"Evaluate the 'Relatedness' of the agricultural machinery market to Tsukuda's existing portfolio. Does this diversification reduce or increase the firm's overall strategic risk?":"Evaluate the 'Relatedness' of the agricultural machinery market to Tsukuda's existing portfolio. Does this diversification reduce or increase the firm's overall strategic risk?"}"</em></p>

  <div class="callout gold" style="margin-bottom:18px;">
    <p class="p" style="font-size:13px;"><strong>${zh?"使用提示：":"Usage Tips:"}</strong><br/>
    ${zh?`① 每一層<em>先思考再輸入</em>——不要直接複製上課內容<br/>
    ② 各層的框架標籤是提示，不是限制——你可以跨框架連結<br/>

    `① <em>Think before typing</em> in each layer — don't just copy lecture content<br/>

      </div>`;
    }).join("")}
  </div>

  <div class="gameBtnRow" style="margin-top:14px;">
    <button class="gameBtn primary" id="memoExport">${zh?"複製備忘錄草稿":"Copy Memo Draft"}</button>
    <button class="gameBtn" id="memoHints">${zh?"查看評分提示":"View Scoring Hints"}</button>

    ${zh?`<strong>① 分析深度（層次1）：</strong>有沒有區分 SIC 測量的相關性 vs. 資源相關性？僅說「農機和火箭不同」是表面分析；需要說明為什麼「精密加工知識」算是（或不算）資源相關性。<br/><br/>
    <strong>② 框架一致性（層次2）：</strong>連續體定位是否與後續的組織設計建議一致？若說「佃製作所是連續體右端（高相關）」，就必須建議整合型組織架構；若說「左端（非相關）」，就必須建議獨立事業部架構。<br/><br/>
    <strong>③ 風險論證的細緻度（層次3）：</strong>是否避免了「多角化=降低風險」的直覺式論斷？最強的論點是：在特定條件（高不確定性+漸進式投資+與不確定性對齊）下，農機多角化<em>可以</em>降低風險；反之則增加。<br/><br/>
    <strong>④ 建議的可執行性（層次4）：</strong>建議是否具體可行？「繼續觀察」不算建議；「以合資方式以 30% 股權進入，設定 12 個月後的訂單量里程碑作為繼續投入的條件」才是有操作性的建議。`:`<strong>① Depth of analysis (Layer 1):</strong> Does it distinguish between SIC-based relatedness vs. resource relatedness? Simply saying 'ag-machinery and rockets are different' is surface analysis; need to explain why 'precision machining knowledge' does (or doesn't) count as resource relatedness.<br/><br/>
    <strong>② Framework consistency (Layer 2):</strong> Does the continuum positioning align with subsequent organizational design recommendations? If claiming 'Tsukuda is at the right end (highly related),' must recommend an integrated organizational structure; if 'left end (unrelated),' must recommend independent business unit structure.<br/><br/>
    <strong>③ Nuance of risk argument (Layer 3):</strong> Avoid the intuitive claim 'diversification = risk reduction'? The strongest argument is: under specific conditions (high uncertainty + incremental investment + alignment with uncertainty), ag-machinery diversification <em>can</em> reduce risk; otherwise it increases risk.<br/><br/>
    <strong>④ Actionability of recommendations (Layer 4):</strong> Are recommendations specific and actionable? 'Continue observing' is not a recommendation; 'enter via JV with 30% equity, setting a 12-month order volume milestone as the condition for continued investment' is an operational recommendation.`}
  </div>`;
}

function wsChange(el){
  ST.ws[el.dataset.wskey]=el.value; save();
  const wc=el.nextElementSibling;
  if(wc&&wc.classList.contains('memoWordCount')) wc.textContent=el.value.trim()?el.value.trim().split(/\s+/).length+' '+(ST.lang==="zh"?"字":"words"):'0 '+(ST.lang==="zh"?"字":"words");
}

function render(){
  const views={s0:viewS0,t1:viewT1,t2:viewT2,t3:viewT3,c1:viewC1,s1:viewS1,student:viewStudent};
  const fn=views[ST.view]||viewS0;
  content.innerHTML=fn();

  // Nav active state
  document.querySelectorAll(".navItem").forEach(b=>{
    b.classList.toggle("active",b.dataset.view===ST.view);
  });

  // Poll votes
  document.querySelectorAll("[data-poll]").forEach(btn=>{
    btn.addEventListener("click",function(){
      vote(this.dataset.poll,this.dataset.opt);
      render();
    });
  });

  // Quiz
  document.querySelectorAll("[data-quiz]").forEach(btn=>{
    btn.addEventListener("click",function(){
      if(ST.quizDone[this.dataset.quiz])return;
      ST.quizDone[this.dataset.quiz]=parseInt(this.dataset.idx)+1;
      save(); render();
    });
  });

  // Classify drag-drop
  setupClassify();

  // Continuum slider
  const contBar=document.getElementById("contBar");
  const contMarker=document.getElementById("contMarker");
  if(contBar&&contMarker){
    let dragging=false;
    contMarker.addEventListener("mousedown",e=>{dragging=true;e.preventDefault();});
    document.addEventListener("mousemove",e=>{
      if(!dragging)return;
      const r=contBar.getBoundingClientRect();
      const p=Math.max(0,Math.min(100,((e.clientX-r.left)/r.width)*100));
      ST.continuumPos=Math.round(p);
      contMarker.style.left=ST.continuumPos+"%";
      save();
      // Update feedback
      const fb=document.getElementById("contFeedback");
      if(fb){const pos=ST.continuumPos;const zh=ST.lang==="zh";
        fb.innerHTML=zh?`<strong>目前位置（${pos}%）：</strong> ${pos<20?'完全不相關端——主要透過財務治理創造價值，各業務幾乎獨立':pos<40?'偏不相關——存在一些流程或治理上的協同，但業務間資源分享有限':pos<60?'中段——有顯著的管理流程共享，但產品/市場協同仍有限':pos<80?'偏相關——業務間有實質的資源共享':'高度相關——共享品牌、通路、供應鏈，總部深入參與業務運作'}。<br/><em>思考：進入農業機械後，這個位置應如何調整？組織設計需要哪些對應改變？</em>`
        :`<strong>Current position (${pos}%):</strong> ${pos<20?'Highly unrelated — value created primarily through financial governance; businesses nearly independent':pos<40?'Leaning unrelated — some process/governance synergies, limited resource sharing':pos<60?'Mid-continuum — significant management process sharing, but limited product/market synergies':pos<80?'Leaning related — substantial resource sharing across businesses':'Highly related — shared brand, channels, supply chain; HQ deeply involved in business operations'}.<br/><em>Think: How should this position adjust after entering agricultural machinery?</em>`;
      }
    });
    document.addEventListener("mouseup",()=>{dragging=false;});
    // touch
    contMarker.addEventListener("touchstart",e=>{dragging=true;e.preventDefault();},{passive:false});
    document.addEventListener("touchmove",e=>{
      if(!dragging)return;
      const r=contBar.getBoundingClientRect();
      const p=Math.max(0,Math.min(100,((e.touches[0].clientX-r.left)/r.width)*100));
      ST.continuumPos=Math.round(p);
      contMarker.style.left=ST.continuumPos+"%";
      save();
    },{passive:true});
    document.addEventListener("touchend",()=>{dragging=false;});
  }

  // Continuum reveal
  const contRevBtn=document.getElementById("contRevealBtn");
  if(contRevBtn) contRevBtn.addEventListener("click",()=>{
    document.getElementById("contReveal").classList.toggle("visible");
  });

  // M-P Shape picker
  document.querySelectorAll("[data-mpshape]").forEach(el=>{
    el.addEventListener("click",function(){
      ST.mpChoice=this.dataset.mpshape; save(); render();
    });
  });

  // Risk matrix
  document.querySelectorAll("[data-risk]").forEach(el=>{
    el.addEventListener("click",function(){
      ST.riskCell=this.dataset.risk; save(); render();
    });
  });

  // Scene tabs
  document.querySelectorAll("[data-scenetab]").forEach(el=>{
    el.addEventListener("click",function(){
      if(!ST.sceneTabs) ST.sceneTabs={};
      ST.sceneTabs[this.dataset.scene]=parseInt(this.dataset.scenetab);
      save(); render();
    });
  });

  // Classify reveal / reset
  const cr=document.getElementById("classifyReveal");
  if(cr) cr.addEventListener("click",()=>{document.getElementById("classifyRevealBox").classList.toggle("visible");});
  const crr=document.getElementById("classifyReset");
  if(crr) crr.addEventListener("click",()=>{
    const keys=Object.keys(ST.classifyDone).filter(k=>k.startsWith("t1_"));
    keys.forEach(k=>delete ST.classifyDone[k]);
    save(); render();
  });

  // Memo hints
  const mh=document.getElementById("memoHints");
  if(mh) mh.addEventListener("click",()=>{document.getElementById("memoHintsBox").classList.toggle("visible");});

  // Memo export
  const me=document.getElementById("memoExport");
  if(me) me.addEventListener("click",()=>{
    const text=["memo_1","memo_2","memo_3","memo_4"].map((k,i)=>`=== Layer ${i+1} ===\n${ST.ws[k]||"(empty)"}`).join("\n\n");
    navigator.clipboard.writeText(text).then(()=>showToast("✅ Copied!")).catch(()=>showToast("Please copy manually"));
  });

  // Worksheet textareas
  document.querySelectorAll("[data-wskey]").forEach(el=>{
    el.addEventListener("input",function(){wsChange(this);});
  });

  // Nav clicks
  document.querySelectorAll("[data-view]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      ST.view=btn.dataset.view; save(); render();
      content.scrollTop=0;
    });
  });
}

function setupClassify(){
  const bank=document.getElementById("chipBank");
  const cols=document.querySelectorAll("[data-cat]");
  if(!bank) return;
  // Drag events on chips in bank
  bank.querySelectorAll("[data-chip]").forEach(chip=>{
    chip.addEventListener("dragstart",e=>{e.dataTransfer.setData("text/plain",chip.dataset.chip);chip.classList.add("dragging");});
    chip.addEventListener("dragend",()=>chip.classList.remove("dragging"));
  });
  cols.forEach(col=>{
    col.addEventListener("dragover",e=>{e.preventDefault();col.classList.add("over");});
    col.addEventListener("dragleave",()=>col.classList.remove("over"));
    col.addEventListener("drop",e=>{
      e.preventDefault();col.classList.remove("over");
      const cid=e.dataTransfer.getData("text/plain");
      ST.classifyDone["t1_"+cid]=col.dataset.cat;
      save(); render();
    });
  });
}

// Keyboard nav
document.addEventListener("keydown",e=>{
  if(e.target.tagName==="TEXTAREA"||e.target.tagName==="INPUT") return;
  const i=VIEW_ORDER.indexOf(ST.view);
  if(e.key==="ArrowRight"&&i<VIEW_ORDER.length-1){ST.view=VIEW_ORDER[i+1];save();render();content.scrollTop=0;}
  if(e.key==="ArrowLeft"&&i>0){ST.view=VIEW_ORDER[i-1];save();render();content.scrollTop=0;}
  if(e.key==="l"||e.key==="L"){ST.lang=ST.lang==="zh"?"en":"zh";save();render();}
  if(e.key==="p"||e.key==="P"){ST.presenter=!ST.presenter;document.body.classList.toggle("presenter",ST.presenter);save();}
  if(e.key==="r"||e.key==="R"){if(confirm("Reset all state?")){localStorage.removeItem(STORE);ST={...DEF};render();}}
});

// Control buttons
document.getElementById("btnLang").addEventListener("click",()=>{ST.lang=ST.lang==="zh"?"en":"zh";save();render();});
document.getElementById("btnPresenter").addEventListener("click",()=>{ST.presenter=!ST.presenter;document.body.classList.toggle("presenter",ST.presenter);save();showToast(ST.presenter?"投影模式 ON":"投影模式 OFF");});
document.getElementById("btnReset").addEventListener("click",()=>{if(confirm("Reset all state?")){localStorage.removeItem(STORE);ST={...DEF};render();}});
document.getElementById("btnStudent").addEventListener("click",()=>{ST.view="student";save();render();content.scrollTop=0;});
document.getElementById("btnHelp").addEventListener("click",()=>showToast("⬅ ➡ 切換段落 | L 語言 | P 投影 | R 重置"));

// Initial render
render();
</script>
</body>
</html>
